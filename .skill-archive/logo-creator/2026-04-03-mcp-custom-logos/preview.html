<!DOCTYPE html>
<html>
<head>
  <title>MCP Server Logo Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      padding: 40px;
      margin: 0;
      color: white;
    }
    h1 { text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    .logo-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: transform 0.2s;
    }
    .logo-card:hover { transform: translateY(-4px); }
    .logo-card img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    .logo-card h3 { margin: 0; color: #333; font-size: 15px; }
    .logo-card p { margin: 4px 0 0; color: #888; font-size: 12px; }
    .size-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .size-preview img { width: auto; height: auto; margin: 0; }
    .size-preview span { color: #aaa; font-size: 10px; }
  </style>
</head>
<body>
  <h1>MCP Server Icons — Custom CDIT Logos</h1>
  <p class="subtitle">Generated via Bildsprache MCP &middot; 2026-04-03</p>

  <div class="grid">
    <div class="logo-card">
      <img src="writings.png">
      <h3>Writings</h3>
      <p>Blog, newsletter, diary</p>
      <div class="size-preview">
        <div><img src="writings.png" style="width:48px;height:48px"><br><span>48px</span></div>
        <div><img src="writings.png" style="width:32px;height:32px"><br><span>32px</span></div>
        <div><img src="writings.png" style="width:16px;height:16px"><br><span>16px</span></div>
      </div>
    </div>

    <div class="logo-card">
      <img src="bildsprache.png">
      <h3>Bildsprache</h3>
      <p>AI image generation</p>
      <div class="size-preview">
        <div><img src="bildsprache.png" style="width:48px;height:48px"><br><span>48px</span></div>
        <div><img src="bildsprache.png" style="width:32px;height:32px"><br><span>32px</span></div>
        <div><img src="bildsprache.png" style="width:16px;height:16px"><br><span>16px</span></div>
      </div>
    </div>

    <div class="logo-card">
      <img src="klartext.png">
      <h3>Klartext</h3>
      <p>Brand-aware copywriting</p>
      <div class="size-preview">
        <div><img src="klartext.png" style="width:48px;height:48px"><br><span>48px</span></div>
        <div><img src="klartext.png" style="width:32px;height:32px"><br><span>32px</span></div>
        <div><img src="klartext.png" style="width:16px;height:16px"><br><span>16px</span></div>
      </div>
    </div>

    <div class="logo-card">
      <img src="stolperstein.png">
      <h3>Stolperstein</h3>
      <p>Knowledge capture</p>
      <div class="size-preview">
        <div><img src="stolperstein.png" style="width:48px;height:48px"><br><span>48px</span></div>
        <div><img src="stolperstein.png" style="width:32px;height:32px"><br><span>32px</span></div>
        <div><img src="stolperstein.png" style="width:16px;height:16px"><br><span>16px</span></div>
      </div>
    </div>
  </div>
</body>
</html>
