services:
  mcp-lexoffice:
    build: .
    network_mode: host
    environment:
      - LEXOFFICE_API_KEY=${LEXOFFICE_API_KEY}
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=${HOST_PORT:-8001}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - FASTMCP_HOME=/data/fastmcp
    volumes:
      - fastmcp-data:/data/fastmcp
    restart: unless-stopped

volumes:
  fastmcp-data:
