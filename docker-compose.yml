services:
  mcp-lexoffice:
    build: .
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      - LEXOFFICE_API_KEY=${LEXOFFICE_API_KEY}
      - MCP_TRANSPORT=streamable-http
      - MCP_PORT=8000
      - MCP_AUTH_BASE_URL=${MCP_AUTH_BASE_URL:-}
      - LEXOFFICE_MCP_API_KEY=${LEXOFFICE_MCP_API_KEY:-}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-mcp-lexoffice}
    restart: unless-stopped
